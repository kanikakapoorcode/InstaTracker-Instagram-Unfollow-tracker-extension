<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>InstaTrack</title>
  <style>
    :root {
      --bg-color: #0b0b0f;
      --card-bg: rgba(22, 22, 28, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-color: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #c084fc;
      --primary-hover: #a855f7;
      --accent-gradient: linear-gradient(135deg, #f43f5e, #a855f7, #6366f1);
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      width: 320px;
      font-family: var(--font-sans);
      background-color: var(--bg-color);
      color: var(--text-color);
      overflow: hidden;
    }

    .container {
      padding: 24px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border: 1px solid var(--border-color);
      border-radius: 0;
      background: radial-gradient(circle at top, rgba(168, 85, 247, 0.15) 0%, rgba(11, 11, 15, 0) 70%);
    }

    .logo-container {
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 24px;
      color: #ffffff;
      box-shadow: 0 8px 20px rgba(168, 85, 247, 0.3);
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 6px 0;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 13px;
      color: var(--text-muted);
      margin: 0 0 20px 0;
      line-height: 1.4;
    }

    .status-box {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      margin-bottom: 20px;
      font-size: 13px;
      box-sizing: border-box;
    }

    .status-text {
      font-weight: 500;
    }

    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .status-checking {
      color: var(--text-muted);
    }
    .status-checking .status-indicator {
      background-color: var(--text-muted);
      animation: pulse 1.5s infinite;
    }

    .status-connected {
      color: #4ade80;
    }
    .status-connected .status-indicator {
      background-color: #4ade80;
    }

    .status-disconnected {
      color: #f87171;
    }
    .status-disconnected .status-indicator {
      background-color: #f87171;
    }

    button {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 4px 15px rgba(244, 63, 94, 0.2);
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background-color: var(--card-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .footer {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.2);
      margin-top: 16px;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <div class="logo-icon">iT</div>
    </div>
    <h1>InstaTrack</h1>
    <p>Local Follower & Unfollower Insights</p>

    <div class="status-box">
      <div id="status" class="status-checking">
        <span class="status-indicator"></span>
        <span class="status-text">Checking login status...</span>
      </div>
    </div>

    <button id="action-btn" class="btn-secondary" style="display: none;">
      Checking...
    </button>

    <div class="footer">
      100% local analysis • No data is sent online
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
